<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Rider's | Premium Lounge</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        :root { --one-ui-blue: #3e5cf4; --bg: #0f172a; }
        body { background-color: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        
        .one-ui-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 32px; }
        .btn-focus { background-color: var(--one-ui-blue); border-radius: 24px; transition: all 0.2s cubic-bezier(0.2, 0, 0, 1); }
        .btn-focus:hover { transform: scale(1.02); filter: brightness(1.1); box-shadow: 0 8px 24px rgba(62, 92, 244, 0.3); }

        /* Navigation dropdown menu */
        #userMenu { display: none; position: fixed; top: 80px; right: 24px; width: 260px; z-index: 100; animation: menuFade 0.2s ease-out; }
        @keyframes menuFade { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        section { display: none; padding: 100px 24px; max-width: 1000px; margin: 0 auto; }
        section.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Authentication Gate */
        #auth-gate { position: fixed; inset: 0; z-index: 1000; background: var(--bg); display: flex; align-items: center; justify-content: center; }
        
        input, select { background: rgba(255, 255, 255, 0.05)!important; border: 1px solid rgba(255, 255, 255, 0.1)!important; padding: 16px!important; border-radius: 20px!important; color: white!important; width: 100%; outline: none; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body>

    <!-- 🔐 PERSISTENT LOGIN GATE -->
    <div id="auth-gate">
        <div class="text-center p-8 w-full max-w-sm">
            <div class="w-20 h-20 bg-slate-800 rounded-[32px] flex items-center justify-center mx-auto mb-8 shadow-2xl border border-blue-500/20">
                <i class="fas fa-circle-nodes text-3xl text-blue-500"></i>
            </div>
            <h1 class="text-3xl font-bold tracking-tight mb-2">Night Rider's</h1>
            <p class="text-slate-500 text-sm mb-12">Premium Pool & Snooker Lounge</p>
            <div id="g_id_onload" data-client_id="510142501463-5huhj4a4taha2koajagarg1fmikcakgg.apps.googleusercontent.com" data-callback="onSignIn"></div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill" data-theme="filled_black" data-text="signin_with" data-size="large"></div>
            <button onclick="closeAuth()" class="mt-8 text-xs font-semibold text-slate-600 hover:text-blue-400 uppercase tracking-widest transition">Continue as Guest</button>
        </div>
    </div>

    <!-- 🧭 TOP NAVIGATION -->
    <nav class="fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center bg-slate-900/60 backdrop-blur-xl border-b border-white/5">
        <div class="text-xl font-bold tracking-tight cursor-pointer" onclick="navigate('home')">Night <span class="text-blue-500">Rider's</span></div>
        
        <div id="profileBtn" onclick="toggleMenu()" class="cursor-pointer flex items-center gap-3 bg-white/5 hover:bg-white/10 p-1.5 pr-4 rounded-full border border-white/10 transition">
            <img id="pfp" src="https://via.placeholder.com/40" class="w-8 h-8 rounded-full border border-blue-500/30">
            <i class="fas fa-bars text-sm text-slate-500"></i>
        </div>

        <!-- One UI Dropdown Menu -->
        <div id="userMenu" class="one-ui-card p-6 shadow-2xl">
            <div class="pb-4 mb-4 border-b border-white/10">
                <p id="menuName" class="font-bold text-sm">Guest Mode</p>
                <p id="menuEmail" class="text-[10px] text-slate-500 uppercase tracking-tighter">Sync Disabled</p>
            </div>
            <div class="flex flex-col gap-2 text-sm font-medium">
                <button onclick="navigate('home')" class="flex items-center gap-4 p-3 hover:bg-white/5 rounded-2xl transition text-slate-300"><i class="fas fa-home text-blue-500 w-5"></i> Home</button>
                <button onclick="navigate('history')" class="flex items-center gap-4 p-3 hover:bg-white/5 rounded-2xl transition text-slate-300"><i class="fas fa-history text-blue-500 w-5"></i> My Bookings</button>
                <button onclick="navigate('account')" class="flex items-center gap-4 p-3 hover:bg-white/5 rounded-2xl transition text-slate-300"><i class="fas fa-user-circle text-blue-500 w-5"></i> Account Details</button>
                <button onclick="logout()" class="flex items-center gap-4 p-3 text-red-400 hover:bg-red-500/10 rounded-2xl transition mt-2"><i class="fas fa-sign-out-alt w-5"></i> Logout</button>
            </div>
        </div>
    </nav>

    <!-- 🏠 HOME SECTION -->
    <section id="home" class="active flex flex-col items-center justify-center text-center min-h-[90vh]">
        <h2 class="text-5xl md:text-7xl font-bold tracking-tight mb-8">Master the Break.</h2>
        <p class="text-slate-400 text-lg mb-12 max-w-lg">Kothrud's premier sanctuary for cue sports. Professional tables and a modern atmosphere.</p>
        <div class="flex flex-col sm:flex-row gap-4">
            <button onclick="navigate('booking')" class="btn-focus px-12 py-4 font-bold shadow-xl">Reserve a Table</button>
            <button onclick="navigate('history')" class="px-12 py-4 font-bold text-slate-400 hover:text-white transition">View Earlier Bookings</button>
        </div>
    </section>

    <!-- 📅 BOOKING FORM -->
    <section id="booking">
        <div class="max-w-2xl mx-auto one-ui-card p-8 md:p-12">
            <h3 class="text-3xl font-bold mb-10 text-center">New Reservation</h3>
            <form id="bookingForm" class="space-y-6">
                <div>
                    <label class="text-xs font-bold text-slate-500 ml-2 mb-2 block uppercase tracking-widest">1. Select Game Type</label>
                    <div class="flex gap-4">
                        <button type="button" onclick="loadTablesByCat('Pool')" class="flex-1 p-4 rounded-2xl bg-white/5 border border-white/10 hover:border-blue-500 transition focus:ring-2 ring-blue-500">Pool</button>
                        <button type="button" onclick="loadTablesByCat('Snooker')" class="flex-1 p-4 rounded-2xl bg-white/5 border border-white/10 hover:border-blue-500 transition focus:ring-2 ring-blue-500">Snooker</button>
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 ml-2 mb-2 block uppercase tracking-widest">2. Choose Available Table</label>
                    <select id="tableSelect" required></select>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 ml-2 mb-2 block uppercase tracking-widest">3. Select Date & Time</label>
                    <input type="datetime-local" id="datetime" required>
                </div>
                <button type="submit" class="w-full btn-focus py-5 font-black uppercase tracking-widest text-sm mt-4">Confirm Reservation</button>
            </form>
        </div>
    </section>

    <!-- 📜 EARLIER BOOKINGS -->
    <section id="history">
        <div class="flex justify-between items-center mb-10">
            <h3 class="text-3xl font-bold">Earlier Bookings</h3>
            <button onclick="navigate('booking')" class="btn-focus px-6 py-2 text-xs font-bold">Book Now</button>
        </div>
        <div id="bookingList" class="grid gap-4">
            <!-- Data loaded dynamically -->
        </div>
    </section>

    <!-- 👤 ACCOUNT DETAILS -->
    <section id="account">
        <div class="max-w-md mx-auto one-ui-card p-10 text-center">
            <img id="accImg" src="https://via.placeholder.com/100" class="w-24 h-24 rounded-[32px] mx-auto mb-6 border-4 border-blue-500/20">
            <h3 id="accName" class="text-2xl font-bold mb-2">Guest Player</h3>
            <p id="accEmail" class="text-slate-500 mb-8">Not Logged In</p>
            <button onclick="logout()" class="w-full py-4 rounded-2xl bg-red-500/10 text-red-400 font-bold hover:bg-red-500/20 transition">Sign Out</button>
        </div>
    </section>

    <!-- 📱 QUICK CONTACTS -->
    <div class="fixed bottom-8 right-8 z-40 flex flex-col gap-4">
        <a href="https://wa.me/919850600200" class="w-14 h-14 bg-[#25D366] rounded-2xl flex items-center justify-center text-2xl shadow-2xl hover:scale-110 transition"><i class="fab fa-whatsapp"></i></a>
        <a href="tel:+919850600200" class="w-14 h-14 bg-white text-black rounded-2xl flex items-center justify-center text-xl shadow-2xl hover:scale-110 transition"><i class="fas fa-phone"></i></a>
    </div>

    <script>
        const APPS_URL = 'https://script.google.com/macros/s/AKfycbxWB--kmORogE05a71QfGp1odkVEEBWybrtegWtdNJ4PAVdnFk24k_DyKTJVJGoVG4/exec';
        let currentUser = null;
        let cachedTables = [];

        // 1. PERSISTENT LOGIN ON REFRESH
        window.onload = function() {
            const saved = localStorage.getItem('nr_persistent_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                initSession();
            }
        };

        function onSignIn(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            currentUser = { name: payload.name, email: payload.email, img: payload.picture };
            localStorage.setItem('nr_persistent_user', JSON.stringify(currentUser));
            initSession();
            
            // Sync login to Logs
            fetch(APPS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({type: 'LOGIN', ...currentUser}) });
        }

        function initSession() {
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('pfp').src = currentUser.img;
            document.getElementById('accImg').src = currentUser.img;
            document.getElementById('menuName').innerText = currentUser.name;
            document.getElementById('accName').innerText = currentUser.name;
            document.getElementById('menuEmail').innerText = currentUser.email;
            document.getElementById('accEmail').innerText = currentUser.email;
            refreshData();
        }

        function logout() {
            localStorage.removeItem('nr_persistent_user');
            location.reload();
        }

        // 2. DYNAMIC TABLE DATA
        async function refreshData() {
            if (!currentUser) return;
            const res = await fetch(`${APPS_URL}?type=init&email=${currentUser.email}`);
            const data = await res.json();
            cachedTables = data.tables;
            
            // Render History
            const historyList = document.getElementById('bookingList');
            historyList.innerHTML = data.bookings.length ? data.bookings.map(b => `
                <div class="one-ui-card p-6 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-sm">${b.table}</p>
                        <p class="text-[10px] text-slate-500">${new Date(b.time).toLocaleString()}</p>
                    </div>
                    <span class="text-[10px] font-bold uppercase px-3 py-1 rounded-full bg-blue-500/20 text-blue-400 border border-blue-500/20">${b.status}</span>
                </div>
            `).join('') : '<p class="text-center text-slate-500 py-20">No booking history found.</p>';
            
            loadTablesByCat('Pool'); // Initial Load
        }

        function loadTablesByCat(cat) {
            const select = document.getElementById('tableSelect');
            const filtered = cachedTables.filter(t => t.name.includes(cat));
            select.innerHTML = filtered.map(t => {
                const available = t.status === "Free";
                return `<option value="${t.name}" ${!available ? 'disabled' : ''}>${t.name} (${t.status})</option>`;
            }).join('');
        }

        // 3. UI NAVIGATION
        function navigate(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('userMenu').style.display = 'none';
            window.scrollTo(0,0);
        }

        function toggleMenu() {
            const menu = document.getElementById('userMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function closeAuth() { document.getElementById('auth-gate').style.display = 'none'; }

        // 4. BOOKING SUBMISSION
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                type: 'BOOKING',
                email: currentUser.email,
                name: currentUser.name,
                table: document.getElementById('tableSelect').value,
                datetime: document.getElementById('datetime').value
            };

            fetch(APPS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            
            const waText = `Hi Night Rider's! I'm ${data.name}. I'd like to book ${data.table} for ${new Date(data.datetime).toLocaleString()}. Please confirm availability.`;
            window.open(`https://wa.me/919850600200?text=${encodeURIComponent(waText)}`, '_blank');
            alert('Reservation request sent! Our team will contact you on WhatsApp.');
            navigate('history');
        });
    </script>
</body>
</html>
