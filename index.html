<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Rider's | Elite Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://unpkg.com/scrollreveal"></script>

    <style>
        :root { --violet: #8B5CF6; --cyan: #06B6D4; --black: #020202; }
        body { background-color: var(--black); color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Syne', sans-serif; text-transform: uppercase; }
        
        .one-ui-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
        }

        .text-crazy {
            background: linear-gradient(to right, #fff, var(--violet), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .btn-neon {
            background: linear-gradient(45deg, var(--violet), var(--cyan));
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
            transition: 0.3s;
        }
        
        .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; font-weight: 800; }
        .status-free { background: #10b981; color: white; }
        .status-booked { background: #f59e0b; color: white; }
        .status-in-use { background: #ef4444; color: white; }

        /* Dropdown Menu */
        .profile-menu {
            display: none;
            position: absolute; right: 0; top: 70px;
            width: 250px; background: #0a0a0a; border: 1px solid #333;
            border-radius: 20px; padding: 15px; z-index: 100;
        }
        .profile-menu.active { display: block; }
        
        input, select {
            background: rgba(255,255,255,0.05) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            padding: 1rem !important;
            border-radius: 15px !important;
            color: white !important;
            width: 100%;
        }

        #bookings-view { display: none; position: fixed; inset: 0; background: black; z-index: 1000; overflow-y: auto; padding: 50px 20px; }
    </style>
</head>
<body>

    <!-- 🔐 AUTH GATE -->
    <div id="auth-gate" class="fixed inset-0 bg-black z-[9999] flex items-center justify-center">
        <div class="text-center">
            <h1 class="text-5xl font-black mb-10 tracking-tighter">Night Rider's</h1>
            <div id="g_id_onload" data-client_id="510142501463-5huhj4a4taha2koajagarg1fmikcakgg.apps.googleusercontent.com" data-callback="onSignIn"></div>
            <div class="g_id_signin" data-type="standard"></div>
            <button onclick="unlockGuest()" class="mt-8 text-xs text-gray-500 underline">Continue as Guest</button>
        </div>
    </div>

    <!-- 🧭 NAV -->
    <nav class="fixed top-0 w-full z-40 px-6 py-4 flex justify-between items-center backdrop-blur-xl border-b border-white/5">
        <div class="text-xl font-black italic cursor-pointer" onclick="showHome()">NIGHT <span class="text-cyan-500">RIDER'S</span></div>
        
        <div class="flex items-center gap-4 relative">
            <div id="user-display" class="flex items-center gap-3">
                <!-- User UI injected here -->
            </div>
            
            <!-- Three Lines Menu -->
            <button onclick="toggleMenu()" class="text-2xl text-white ml-2"><i class="fas fa-bars"></i></button>
            
            <div id="profile-menu" class="profile-menu one-ui-glass shadow-2xl">
                <p id="menu-user-name" class="font-bold text-sm mb-1"></p>
                <p id="menu-user-email" class="text-[10px] text-gray-500 mb-4"></p>
                <hr class="border-white/10 mb-4">
                <div class="flex flex-col gap-3 text-xs font-bold uppercase tracking-widest">
                    <button onclick="showHome()" class="text-left hover:text-cyan-400">Home</button>
                    <button onclick="showBookings()" class="text-left hover:text-cyan-400">My Bookings</button>
                    <button onclick="logout()" class="text-left text-red-500">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 🏠 HOME CONTENT -->
    <main id="home-view">
        <section class="h-screen flex flex-col items-center justify-center text-center px-6">
            <h1 class="text-7xl md:text-9xl font-black text-crazy leading-none mb-6">RACK 'EM</h1>
            <p class="text-gray-400 tracking-[0.5em] mb-10">THE ELITE CUE CLUB</p>
            <a href="#booking" class="btn-neon px-10 py-4 rounded-full font-bold text-black uppercase">Book a Table</a>
        </section>

        <!-- 📅 BOOKING SECTION -->
        <section id="booking" class="py-20 px-6 max-w-4xl mx-auto">
            <div class="one-ui-glass p-8 md:p-12">
                <h2 class="text-3xl font-black mb-8">Reserve Table</h2>
                <form id="bookingForm" class="space-y-6">
                    <div class="grid md:grid-cols-2 gap-6">
                        <input type="text" id="form-name" placeholder="Name" required>
                        <input type="tel" id="form-phone" placeholder="Phone" required>
                    </div>
                    <div class="grid md:grid-cols-2 gap-6">
                        <select id="game-type" onchange="updateTableList()">
                            <option value="Pool">8-Ball Pool (9 Tables)</option>
                            <option value="Snooker">Snooker (2 Tables)</option>
                        </select>
                        <select id="table-number" required>
                            <!-- Dynamic tables load here -->
                        </select>
                    </div>
                    <input type="datetime-local" id="form-datetime" required>
                    <button type="submit" class="btn-neon w-full py-4 rounded-xl font-black text-black">CONFIRM SLOT</button>
                </form>
            </div>
        </section>
    </main>

    <!-- 📜 BOOKINGS HISTORY VIEW -->
    <div id="bookings-view">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-4xl font-black">My <span class="text-violet-500">History</span></h2>
                <button onclick="showHome()" class="bg-white/10 px-6 py-2 rounded-full text-xs font-bold uppercase">Back Home</button>
            </div>
            <div id="bookings-list" class="space-y-4">
                <!-- Bookings items -->
            </div>
            <button onclick="showHome(); document.getElementById('booking').scrollIntoView();" class="btn-neon w-full mt-10 py-4 rounded-xl font-black text-black">BOOK NOW</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxWB--kmORogE05a71QfGp1odkVEEBWybrtegWtdNJ4PAVdnFk24k_DyKTJVJGoVG4/exec';
        let currentUser = null;
        let allTablesStatus = [];

        // --- PERSISTENCE LOGIC ---
        window.onload = () => {
            const savedUser = localStorage.getItem('nr_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                completeLogin(currentUser);
            }
            fetchTableData();
        };

        function onSignIn(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            currentUser = {
                name: payload.name,
                email: payload.email,
                picture: payload.picture
            };
            localStorage.setItem('nr_user', JSON.stringify(currentUser));
            completeLogin(currentUser);
        }

        function completeLogin(user) {
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('user-display').innerHTML = `
                <img src="${user.picture}" class="w-10 h-10 rounded-full border-2 border-cyan-500">
                <span class="hidden md:block text-xs font-bold">${user.name.split(' ')[0]}</span>
            `;
            document.getElementById('menu-user-name').innerText = user.name;
            document.getElementById('menu-user-email').innerText = user.email;
            document.getElementById('form-name').value = user.name;
        }

        function logout() {
            localStorage.removeItem('nr_user');
            location.reload();
        }

        // --- UI TOGGLES ---
        function toggleMenu() { document.getElementById('profile-menu').classList.toggle('active'); }
        function showBookings() {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('bookings-view').style.display = 'block';
            toggleMenu();
            fetchUserBookings();
        }
        function showHome() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('bookings-view').style.display = 'none';
        }

        // --- DYNAMIC TABLES ---
        async function fetchTableData() {
            try {
                const res = await fetch(`${API_URL}?action=getTables`);
                allTablesStatus = await res.json();
                updateTableList();
            } catch (e) { console.error("Error fetching tables", e); }
        }

        function updateTableList() {
            const type = document.getElementById('game-type').value;
            const select = document.getElementById('table-number');
            select.innerHTML = '';
            
            const filtered = allTablesStatus.filter(t => t.type === type);
            
            filtered.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.className = "bg-black";
                opt.disabled = t.status !== 'Free';
                opt.innerHTML = `${t.id} — [${t.status}]`;
                select.appendChild(opt);
            });
        }

        // --- BOOKING LOGIC ---
        document.getElementById('bookingForm').onsubmit = async (e) => {
            e.preventDefault();
            if(!currentUser) return alert("Please login first");

            const data = {
                name: document.getElementById('form-name').value,
                email: currentUser.email,
                phone: document.getElementById('form-phone').value,
                game: document.getElementById('game-type').value,
                tableNumber: document.getElementById('table-number').value,
                datetime: document.getElementById('form-datetime').value
            };

            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            });

            const waText = `New Booking: ${data.game} ${data.tableNumber} for ${data.datetime}`;
            window.open(`https://wa.me/919850600200?text=${encodeURIComponent(waText)}`);
            alert("Booking Sent Successfully!");
        };

        async function fetchUserBookings() {
            const list = document.getElementById('bookings-list');
            list.innerHTML = '<p class="text-center py-10 opacity-50">Fetching your records...</p>';
            
            const res = await fetch(`${API_URL}?action=getBookings&email=${currentUser.email}`);
            const data = await res.json();
            
            list.innerHTML = data.length ? '' : '<p class="text-center py-10 opacity-50">No bookings found.</p>';
            data.reverse().forEach(row => {
                list.innerHTML += `
                    <div class="one-ui-glass p-6 flex justify-between items-center">
                        <div>
                            <h4 class="font-black text-violet-400">${row[4]} — Table ${row[5]}</h4>
                            <p class="text-xs text-gray-500">${new Date(row[6]).toLocaleString()}</p>
                        </div>
                        <div class="text-right">
                            <span class="status-badge status-booked">Confirmed</span>
                        </div>
                    </div>
                `;
            });
        }

        function unlockGuest() { document.getElementById('auth-gate').style.display = 'none'; }
    </script>
</body>
</html>
